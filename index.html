<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeniusHub Activity Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        /* Hide scrollbar for a more app-like feel */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -ms-overflow-style: none;
            scrollbar-width: none;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overscroll-behavior-y: none; /* Prevent pull-to-refresh on mobile */
        }
        /* iOS specific tap highlight removal */
        * {
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Strict styling to prevent iOS date inputs from overflowing */
        input[type="date"] {
            -webkit-appearance: none;
            box-sizing: border-box;
            width: 100%;
            max-width: 100%;
            min-height: 3rem;
            display: block;
        }
        
        .fade-in {
            animation: fadeIn 0.2s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toast-enter {
            transform: translateY(100%);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast-enter-active {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="flex justify-center h-screen w-screen overflow-hidden">

    <!-- Mobile App Container -->
    <div class="w-full max-w-md h-full bg-gray-50 flex flex-col relative shadow-2xl">
        
        <!-- Header -->
        <header class="bg-blue-600 text-white pt-12 pb-4 px-6 shadow-md z-10 flex-shrink-0 rounded-b-2xl">
            <div class="mb-3">
                <span class="text-2xl font-extrabold tracking-tight">GeniusHub</span>
            </div>
            <h1 id="header-title" class="text-lg font-bold tracking-wide text-blue-50">Activity Log</h1>
            <p id="header-subtitle" class="text-blue-200 text-xs mt-0.5">Log today's classes</p>
        </header>

        <!-- Main Content Area -->
        <main class="flex-1 overflow-y-auto pb-24 relative overflow-x-hidden">
            
            <!-- VIEW: HOME (Startup Dashboard) -->
            <div id="view-home" class="p-6 fade-in hidden">
                <div class="flex justify-between items-end mb-4">
                    <div>
                        <h2 class="text-lg font-bold text-gray-800">Pending Works</h2>
                        <p class="text-xs text-gray-500">Manage these in the Tasks tab</p>
                    </div>
                    <button onclick="switchView('tasks')" class="text-blue-600 text-xs font-semibold bg-blue-50 px-3 py-1.5 rounded-lg active:bg-blue-100 transition-colors">
                        Manage
                    </button>
                </div>
                <div id="home-pending-tasks" class="space-y-3">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- VIEW: ACTIVITY LOG -->
            <div id="view-log" class="p-6 fade-in hidden w-full">
                <form id="form-log" class="space-y-4 w-full">
                    <div class="w-full">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Student</label>
                        <select id="log-student" required class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm">
                            <option value="" disabled selected>Select a student</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    
                    <div class="flex flex-col gap-4 w-full">
                        <div class="w-full">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="date" id="log-date" required class="p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm text-gray-800">
                        </div>
                        <div class="w-full">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Subject/Class</label>
                            <div class="flex gap-2 items-center w-full">
                                <select id="log-subject-select" required class="flex-1 p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm min-w-0">
                                    <!-- Populated by JS -->
                                </select>
                                <button type="button" onclick="openSubjectModal()" class="p-3 bg-blue-50 text-blue-600 rounded-xl hover:bg-blue-100 transition-colors shadow-sm shrink-0">
                                    <i data-lucide="settings-2" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="w-full">
                        <label class="block text-sm font-medium text-gray-700 mb-1">What was taught?</label>
                        <textarea id="log-notes" rows="4" placeholder="Enter lesson details, progress, and homework..." required class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-sm resize-none"></textarea>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-3.5 rounded-xl shadow-lg hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i> Save Activity
                    </button>
                </form>

                <div class="mt-8">
                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Recent Logs</h3>
                    <div id="recent-logs-list" class="space-y-3">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>

            <!-- VIEW: REPORTS -->
            <div id="view-reports" class="p-6 fade-in hidden w-full">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6 w-full">
                    <h2 class="font-semibold text-gray-800 mb-4">Generate Report</h2>
                    <form id="form-report" class="space-y-4 w-full">
                        <div class="w-full">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Student</label>
                            <select id="report-student" required class="w-full p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                <option value="" disabled selected>Select a student</option>
                                <!-- Populated by JS -->
                            </select>
                        </div>
                        <div class="flex flex-col gap-3 w-full">
                            <div class="w-full">
                                <label class="block text-sm font-medium text-gray-700 mb-1">From</label>
                                <input type="date" id="report-start" required class="p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm text-gray-800">
                            </div>
                            <div class="w-full">
                                <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
                                <input type="date" id="report-end" required class="p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm text-gray-800">
                            </div>
                        </div>
                        <button type="submit" class="w-full mt-2 bg-indigo-600 text-white font-semibold py-3.5 rounded-xl shadow-md hover:bg-indigo-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="file-text" class="w-5 h-5"></i> Preview Report
                        </button>
                    </form>
                </div>

                <!-- Report Preview Container -->
                <div id="report-preview-container" class="hidden">
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider">Preview</h3>
                        <button id="btn-download-pdf" class="text-blue-600 font-semibold text-sm flex items-center gap-1 bg-blue-50 px-3 py-1.5 rounded-lg active:bg-blue-100 transition-colors">
                            <i data-lucide="download" class="w-4 h-4"></i> PDF
                        </button>
                    </div>
                    <!-- This div contents will be printed to PDF -->
                    <div id="pdf-content" class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 text-sm">
                        <!-- Top Left Aligned Header -->
                        <div class="border-b pb-4 mb-5 flex flex-col items-start">
                            <h2 class="text-2xl font-extrabold tracking-tight text-blue-600 mb-1">GeniusHub</h2>
                            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-widest">Daily Class Report</h3>
                            <p id="pdf-student-name" class="text-gray-800 mt-3 font-semibold text-lg"></p>
                            <p id="pdf-date-range" class="text-gray-500 text-xs mt-0.5"></p>
                        </div>
                        <div id="pdf-logs" class="space-y-4">
                            <!-- Populated by JS -->
                        </div>
                        <div class="mt-8 pt-4 border-t text-center text-xs text-gray-400 font-medium tracking-wide">
                            Generated By GeniusHub
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: TASKS -->
            <div id="view-tasks" class="p-6 fade-in hidden w-full">
                <form id="form-task" class="flex flex-col gap-3 mb-6 w-full">
                    <div class="w-full">
                        <input type="text" id="task-input" placeholder="New task..." required class="w-full p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                    </div>
                    <div class="flex gap-2 w-full">
                        <div class="flex-1">
                            <input type="date" id="task-deadline" required class="p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none shadow-sm text-sm text-gray-800">
                        </div>
                        <button type="submit" class="bg-blue-600 text-white px-5 rounded-xl shadow-md hover:bg-blue-700 active:scale-95 transition-all flex items-center justify-center gap-2 font-semibold shrink-0">
                            <i data-lucide="plus" class="w-5 h-5"></i> Add
                        </button>
                    </div>
                </form>

                <div class="space-y-6">
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="clock" class="w-4 h-4"></i> Pending
                        </h3>
                        <div id="tasks-pending" class="space-y-2">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                    
                    <div>
                        <h3 class="text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 flex items-center gap-2">
                            <i data-lucide="check-circle-2" class="w-4 h-4"></i> Completed
                        </h3>
                        <div id="tasks-done" class="space-y-2 opacity-70">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- VIEW: STUDENTS -->
            <div id="view-students" class="p-6 fade-in hidden w-full">
                <form id="form-student" class="flex gap-2 mb-6">
                    <input type="text" id="student-input" placeholder="Add new student name..." required class="flex-1 p-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-blue-500 outline-none shadow-sm">
                    <button type="submit" class="bg-blue-600 text-white p-3 rounded-xl shadow-md hover:bg-blue-700 active:scale-95 transition-all">
                        <i data-lucide="user-plus" class="w-6 h-6"></i>
                    </button>
                </form>

                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden w-full">
                    <ul id="students-list" class="divide-y divide-gray-100">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>

        </main>

        <!-- Bottom Navigation -->
        <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-200 flex justify-around items-center pb-safe pt-2 px-1 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] z-20" style="padding-bottom: max(env(safe-area-inset-bottom), 1rem);">
            <button onclick="switchView('home')" id="nav-home" class="nav-btn flex-1 flex flex-col items-center p-2 text-blue-600 transition-colors">
                <i data-lucide="home" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">Home</span>
            </button>
            <button onclick="switchView('log')" id="nav-log" class="nav-btn flex-1 flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i data-lucide="edit-3" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">Log</span>
            </button>
            <button onclick="switchView('reports')" id="nav-reports" class="nav-btn flex-1 flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i data-lucide="pie-chart" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">Reports</span>
            </button>
            <button onclick="switchView('tasks')" id="nav-tasks" class="nav-btn flex-1 flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i data-lucide="list-todo" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">Tasks</span>
            </button>
            <button onclick="switchView('students')" id="nav-students" class="nav-btn flex-1 flex flex-col items-center p-2 text-gray-400 hover:text-gray-600 transition-colors">
                <i data-lucide="users" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-medium">Students</span>
            </button>
        </nav>

        <!-- Subjects Modal -->
        <div id="subject-modal" class="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-200">
            <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-[90%] flex flex-col max-h-[80%] scale-95 transition-transform duration-200" id="subject-modal-box">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-lg font-bold text-gray-800">Manage Subjects</h3>
                    <button onclick="closeSubjectModal()" class="text-gray-400 hover:text-gray-600 p-1">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>
                
                <form id="form-add-subject" class="flex gap-2 mb-4 w-full">
                    <input type="text" id="new-subject-input" placeholder="New subject name..." required class="flex-1 p-3 rounded-xl border border-gray-200 bg-gray-50 focus:ring-2 focus:ring-blue-500 outline-none text-sm w-full">
                    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-blue-700 transition-all text-sm font-medium shadow-sm shrink-0">Add</button>
                </form>

                <div class="overflow-y-auto flex-1 bg-gray-50 rounded-xl border border-gray-100 p-2 w-full">
                    <ul id="subjects-list" class="divide-y divide-gray-100 w-full">
                        <!-- Populated by JS -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Confirmation Modal -->
        <div id="confirm-modal" class="absolute inset-0 bg-black/40 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-200">
            <div class="bg-white rounded-2xl shadow-2xl p-6 w-full max-w-[85%] scale-95 transition-transform duration-200" id="confirm-modal-box">
                <div class="flex items-center gap-3 mb-3 text-red-600">
                    <i data-lucide="alert-triangle" class="w-6 h-6"></i>
                    <h3 class="text-lg font-bold text-gray-800">Confirm</h3>
                </div>
                <p id="confirm-msg" class="text-sm text-gray-600 mb-6 leading-relaxed">Are you sure?</p>
                <div class="flex gap-3">
                    <button onclick="hideConfirmModal()" class="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-semibold active:bg-gray-50 transition-all">Cancel</button>
                    <button onclick="executeDelete()" class="flex-1 py-3 rounded-xl bg-red-600 text-white font-semibold shadow-md active:bg-red-700 transition-all">Delete</button>
                </div>
            </div>
        </div>

        <!-- Custom Toast Notification -->
        <div id="toast" class="absolute top-4 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-4 py-3 rounded-xl shadow-2xl flex items-center gap-3 z-50 pointer-events-none toast-enter">
            <i data-lucide="check-circle" class="w-5 h-5 text-green-400"></i>
            <span id="toast-msg" class="text-sm font-medium whitespace-nowrap">Success!</span>
        </div>
    </div>

    <script>
        // --- IN-MEMORY STATE ---
        let state = {
            students: [
                { id: 's1', name: 'Emma Johnson' },
                { id: 's2', name: 'Liam Smith' },
                { id: 's3', name: 'Olivia Brown' }
            ],
            subjects: ['Math', 'Physics', 'Chemistry', 'Bio'],
            activities: [
                { id: 'a1', studentId: 's1', date: new Date().toISOString().split('T')[0], subject: 'Math', notes: 'Completed algebraic fractions. Struggled slightly with denominators but grasped it by the end. Homework assigned: Pg 42.' }
            ],
            tasks: [
                { id: 't1', title: 'Prepare quiz for Friday', status: 'pending', deadline: new Date(new Date().setDate(new Date().getDate() + 1)).toISOString().split('T')[0] },
                { id: 't2', title: 'Review Emma\'s essay', status: 'pending', deadline: new Date().toISOString().split('T')[0] },
                { id: 't3', title: 'Send weekly schedule to parents', status: 'done', deadline: new Date(new Date().setDate(new Date().getDate() - 2)).toISOString().split('T')[0] }
            ]
        };

        // --- SAFE ICON LOADER ---
        const refreshIcons = () => {
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        };

        // --- INITIALIZATION ---
        window.addEventListener('load', () => {
            refreshIcons();
            
            document.getElementById('log-date').valueAsDate = new Date();
            document.getElementById('task-deadline').valueAsDate = new Date(); 
            
            const today = new Date();
            const lastWeek = new Date(today);
            lastWeek.setDate(lastWeek.getDate() - 7);
            document.getElementById('report-end').valueAsDate = today;
            document.getElementById('report-start').valueAsDate = lastWeek;

            updateAllViews();
            switchView('home');
        });

        // --- NAVIGATION ---
        const views = ['home', 'log', 'reports', 'tasks', 'students'];
        const viewData = {
            'home': { title: 'Dashboard', subtitle: 'Overview of your pending works' },
            'log': { title: 'Activity Log', subtitle: "Log today's classes" },
            'reports': { title: 'Student Reports', subtitle: "Generate & share PDFs" },
            'tasks': { title: 'My Tasks', subtitle: "Organize your workflow" },
            'students': { title: 'Manage Students', subtitle: "Add or remove students" }
        };

        function switchView(targetView) {
            if (viewData[targetView]) {
                document.getElementById('header-title').innerText = viewData[targetView].title;
                document.getElementById('header-subtitle').innerText = viewData[targetView].subtitle;
            }

            views.forEach(view => {
                const el = document.getElementById(`view-${view}`);
                if (!el) return;

                if (view === targetView) {
                    el.classList.remove('hidden');
                    el.classList.remove('fade-in');
                    void el.offsetWidth; 
                    el.classList.add('fade-in');
                } else {
                    el.classList.add('hidden');
                }

                const navBtn = document.getElementById(`nav-${view}`);
                if (navBtn) {
                    if (view === targetView) {
                        navBtn.classList.remove('text-gray-400');
                        navBtn.classList.add('text-blue-600');
                    } else {
                        navBtn.classList.remove('text-blue-600');
                        navBtn.classList.add('text-gray-400');
                    }
                }
            });
        }

        // --- UI UPDATERS ---
        function updateAllViews() {
            renderStudentDropdowns();
            renderSubjects();
            renderRecentLogs();
            renderTasks();
            renderStudentsList();
        }

        function renderSubjects() {
            const logSubjectSelect = document.getElementById('log-subject-select');
            logSubjectSelect.innerHTML = state.subjects.map(sub => `<option value="${sub}">${sub}</option>`).join('');
            
            const subjectList = document.getElementById('subjects-list');
            if(state.subjects.length === 0) {
                subjectList.innerHTML = `<li class="p-3 text-sm text-gray-400 italic text-center">No subjects. Add one above.</li>`;
                return;
            }

            subjectList.innerHTML = state.subjects.map((sub, index) => `
                <li class="p-3 flex justify-between items-center bg-white rounded-lg shadow-sm border border-gray-100 mb-2">
                    <span class="font-medium text-gray-700 text-sm truncate pr-2">${sub}</span>
                    <button onclick="deleteSubject(${index})" class="text-gray-400 hover:text-red-500 transition-colors p-2 bg-gray-50 rounded-md shrink-0">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </li>
            `).join('');
            refreshIcons();
        }

        function renderStudentDropdowns() {
            const options = `<option value="" disabled selected>Select a student</option>` + 
                state.students.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
            
            document.getElementById('log-student').innerHTML = options;
            document.getElementById('report-student').innerHTML = options;
        }

        const getDeadlineLabel = (dateStr) => {
            const date = new Date(dateStr);
            const today = new Date();
            today.setHours(0,0,0,0);
            const compareDate = new Date(date);
            compareDate.setHours(0,0,0,0);
            
            const diffTime = compareDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            if (diffDays === 0) return '<span class="text-red-600 font-bold text-[10px] uppercase tracking-wider ml-2 bg-red-50 px-2 py-0.5 rounded-md shrink-0">Today</span>';
            if (diffDays === 1) return '<span class="text-orange-600 font-bold text-[10px] uppercase tracking-wider ml-2 bg-orange-50 px-2 py-0.5 rounded-md shrink-0">Tomorrow</span>';
            if (diffDays < 0) return `<span class="text-red-700 font-bold text-[10px] uppercase tracking-wider ml-2 bg-red-100 px-2 py-0.5 rounded-md border border-red-200 shrink-0">Overdue</span>`;
            
            return `<span class="text-gray-500 font-medium text-[10px] ml-2 bg-gray-100 px-2 py-0.5 rounded-md border border-gray-200 shrink-0">${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}</span>`;
        };

        function renderRecentLogs() {
            const list = document.getElementById('recent-logs-list');
            const recent = [...state.activities].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 5);
            
            if(recent.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-400 italic">No activities logged yet.</p>`;
                return;
            }

            list.innerHTML = recent.map(act => {
                const student = state.students.find(s => s.id === act.studentId);
                const studentName = student ? student.name : 'Unknown Student';
                const dateObj = new Date(act.date);
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

                return `
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col gap-2 relative">
                        <button onclick="deleteActivity('${act.id}')" class="absolute top-3 right-3 text-gray-300 hover:text-red-500 transition-colors p-2">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                        <div class="flex justify-between items-start pr-8">
                            <span class="font-semibold text-gray-800 text-sm truncate pr-2">${studentName}</span>
                            <span class="text-[10px] text-blue-600 bg-blue-50 px-2 py-1 rounded-md font-bold uppercase tracking-wider shrink-0">${dateStr}</span>
                        </div>
                        <div class="text-xs font-bold text-gray-500 uppercase tracking-wider">${act.subject}</div>
                        <p class="text-sm text-gray-600 line-clamp-2 mt-1">${act.notes}</p>
                    </div>
                `;
            }).join('');
            refreshIcons();
        }

        function renderTasks() {
            const pendingList = document.getElementById('tasks-pending');
            const doneList = document.getElementById('tasks-done');
            const homeList = document.getElementById('home-pending-tasks');
            
            const pending = state.tasks
                .filter(t => t.status === 'pending')
                .sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
                
            const done = state.tasks.filter(t => t.status === 'done');

            const createHTML = (tasks, isDone) => tasks.map(t => `
                <div class="bg-white p-3 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between gap-3">
                    <div class="flex items-start gap-3 flex-1 overflow-hidden min-w-0 pt-1">
                        <button onclick="toggleTask('${t.id}')" class="flex-shrink-0 text-${isDone ? 'green-500' : 'gray-300'} hover:text-green-600 transition-colors mt-0.5">
                            <i data-lucide="${isDone ? 'check-circle-2' : 'circle'}" class="w-5 h-5"></i>
                        </button>
                        <div class="flex flex-col min-w-0">
                            <span class="text-sm font-medium text-gray-700 truncate ${isDone ? 'line-through text-gray-400' : ''}">${t.title}</span>
                            ${!isDone ? `<div class="flex items-center mt-1"><i data-lucide="calendar" class="w-3 h-3 text-gray-400"></i> ${getDeadlineLabel(t.deadline)}</div>` : ''}
                        </div>
                    </div>
                    <button onclick="deleteTask('${t.id}')" class="text-gray-300 hover:text-red-500 p-2 transition-colors shrink-0">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');

            pendingList.innerHTML = pending.length ? createHTML(pending, false) : `<p class="text-sm text-gray-400 italic">No pending tasks. You're all caught up!</p>`;
            doneList.innerHTML = done.length ? createHTML(done, true) : '';

            if (pending.length === 0) {
                homeList.innerHTML = `<div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 text-center flex flex-col items-center"><i data-lucide="party-popper" class="w-8 h-8 text-yellow-500 mb-2"></i><p class="text-sm text-gray-500 font-medium">All caught up!</p></div>`;
            } else {
                homeList.innerHTML = pending.map(t => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-l-blue-500 border border-y-gray-100 border-r-gray-100 flex items-center justify-between cursor-pointer active:bg-gray-50 transition-colors" onclick="switchView('tasks')">
                        <div class="flex flex-col min-w-0 pr-4">
                            <span class="text-sm font-bold text-gray-800 truncate">${t.title}</span>
                            <div class="flex items-center mt-1">
                                <i data-lucide="calendar" class="w-3 h-3 text-gray-400"></i> ${getDeadlineLabel(t.deadline)}
                            </div>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 text-gray-300 shrink-0"></i>
                    </div>
                `).join('');
            }

            refreshIcons();
        }

        function renderStudentsList() {
            const list = document.getElementById('students-list');
            if(state.students.length === 0) {
                list.innerHTML = `<li class="p-4 text-sm text-gray-400 italic text-center">No students added yet.</li>`;
                return;
            }

            list.innerHTML = state.students.map(s => `
                <li class="p-4 flex justify-between items-center bg-white">
                    <div class="flex items-center gap-3 min-w-0">
                        <div class="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm shrink-0">
                            ${s.name.charAt(0).toUpperCase()}
                        </div>
                        <span class="font-medium text-gray-800 truncate">${s.name}</span>
                    </div>
                    <button onclick="deleteStudent('${s.id}')" class="text-gray-400 hover:text-red-500 transition-colors p-2 shrink-0">
                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                    </button>
                </li>
            `).join('');
            refreshIcons();
        }

        // --- ACTIONS ---

        document.getElementById('form-log').addEventListener('submit', (e) => {
            e.preventDefault();
            const studentId = document.getElementById('log-student').value;
            const date = document.getElementById('log-date').value;
            const subject = document.getElementById('log-subject-select').value;
            const notes = document.getElementById('log-notes').value;

            if(!studentId || !subject) {
                showToast('Please select a student and subject');
                return;
            }

            state.activities.push({
                id: 'a_' + Date.now(),
                studentId, date, subject, notes
            });
            
            document.getElementById('log-notes').value = '';
            renderRecentLogs();
            showToast('Activity logged successfully');
        });

        function openSubjectModal() {
            const modal = document.getElementById('subject-modal');
            const box = document.getElementById('subject-modal-box');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
        }

        function closeSubjectModal() {
            const modal = document.getElementById('subject-modal');
            const box = document.getElementById('subject-modal-box');
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
            }, 200);
        }

        document.getElementById('form-add-subject').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('new-subject-input');
            const val = input.value.trim();
            if(val && !state.subjects.includes(val)) {
                state.subjects.push(val);
                input.value = '';
                renderSubjects();
            } else if (state.subjects.includes(val)) {
                showToast('Subject already exists');
            }
        });

        function deleteSubject(index) {
            const subjectName = state.subjects[index];
            if(state.activities.some(a => a.subject === subjectName)) {
                showToast('Cannot delete subject used in logs.');
                return;
            }
            state.subjects.splice(index, 1);
            renderSubjects();
        }

        function deleteActivity(id) {
            requestConfirm('activity', id, 'Are you sure you want to delete this activity log? This cannot be undone.');
        }

        document.getElementById('form-task').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('task-input');
            const deadlineInput = document.getElementById('task-deadline');
            const title = input.value.trim();
            const deadline = deadlineInput.value;
            
            if(!title || !deadline) return;

            state.tasks.push({
                id: 't_' + Date.now(),
                title, deadline, status: 'pending'
            });

            input.value = '';
            renderTasks();
            showToast('Task added');
        });

        function toggleTask(id) {
            const task = state.tasks.find(t => t.id === id);
            if(task) {
                task.status = task.status === 'pending' ? 'done' : 'pending';
                renderTasks();
            }
        }

        function deleteTask(id) {
            requestConfirm('task', id, 'Are you sure you want to delete this task?');
        }

        document.getElementById('form-student').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('student-input');
            const name = input.value.trim();
            if(!name) return;

            state.students.push({ id: 's_' + Date.now(), name });
            input.value = '';
            updateAllViews();
            showToast('Student added');
        });

        function deleteStudent(id) {
            requestConfirm('student', id, 'Are you sure you want to remove this student? All their activity logs will also be deleted.');
        }

        document.getElementById('form-report').addEventListener('submit', (e) => {
            e.preventDefault();
            const studentId = document.getElementById('report-student').value;
            const startStr = document.getElementById('report-start').value;
            const endStr = document.getElementById('report-end').value;

            if(!studentId || !startStr || !endStr) return;

            const student = state.students.find(s => s.id === studentId);
            const startDate = new Date(startStr);
            const endDate = new Date(endStr);
            startDate.setHours(0,0,0,0);
            endDate.setHours(23,59,59,999);

            const filteredLogs = state.activities.filter(a => {
                if(a.studentId !== studentId) return false;
                const logDate = new Date(a.date);
                return logDate >= startDate && logDate <= endDate;
            }).sort((a, b) => new Date(a.date) - new Date(b.date)); 

            document.getElementById('pdf-student-name').innerText = `Student: ${student.name}`;
            document.getElementById('pdf-date-range').innerText = `Date Range: ${startDate.toLocaleDateString()} to ${endDate.toLocaleDateString()}`;

            const logsContainer = document.getElementById('pdf-logs');
            if(filteredLogs.length === 0) {
                logsContainer.innerHTML = `<p class="text-center text-gray-500 italic py-4">No activities found for this period.</p>`;
            } else {
                logsContainer.innerHTML = filteredLogs.map(log => `
                    <div class="border-l-4 border-blue-500 pl-4 py-2 mb-5 bg-gray-50 rounded-r-lg">
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-extrabold text-gray-800 text-sm tracking-wide">${new Date(log.date).toLocaleDateString()}</span>
                            <span class="text-[10px] bg-white border border-gray-200 px-2 py-1 rounded-md text-blue-600 font-bold uppercase tracking-wider">${log.subject}</span>
                        </div>
                        <p class="text-gray-700 text-sm whitespace-pre-wrap leading-relaxed mt-2">${log.notes}</p>
                    </div>
                `).join('');
            }

            document.getElementById('report-preview-container').classList.remove('hidden');
        });

        document.getElementById('btn-download-pdf').addEventListener('click', () => {
            const element = document.getElementById('pdf-content');
            const studentName = document.getElementById('pdf-student-name').innerText.replace('Student: ', '');
            const filename = `${studentName.replace(/\s+/g, '_')}_Report.pdf`;
            
            const opt = {
                margin:       0.5,
                filename:     filename,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            const btn = document.getElementById('btn-download-pdf');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader" class="w-4 h-4 animate-spin"></i> Generating...`;
            refreshIcons();

            html2pdf().set(opt).from(element).save().then(() => {
                btn.innerHTML = originalHTML;
                refreshIcons();
                showToast('PDF Downloaded');
            });
        });

        // --- CONFIRMATION MODAL & UTILS ---
        let pendingDeleteInfo = null;
        let toastTimeout;

        function requestConfirm(type, id, message) {
            pendingDeleteInfo = { type, id };
            document.getElementById('confirm-msg').innerText = message;
            
            const modal = document.getElementById('confirm-modal');
            const box = document.getElementById('confirm-modal-box');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            void modal.offsetWidth;
            modal.classList.remove('opacity-0');
            box.classList.remove('scale-95');
            box.classList.add('scale-100');
            refreshIcons();
        }

        function hideConfirmModal() {
            const modal = document.getElementById('confirm-modal');
            const box = document.getElementById('confirm-modal-box');
            
            modal.classList.add('opacity-0');
            box.classList.remove('scale-100');
            box.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.remove('flex');
                modal.classList.add('hidden');
                pendingDeleteInfo = null;
            }, 200);
        }

        function executeDelete() {
            if (!pendingDeleteInfo) return;
            const { type, id } = pendingDeleteInfo;
            
            if (type === 'activity') {
                state.activities = state.activities.filter(a => a.id !== id);
                renderRecentLogs();
                showToast('Activity deleted');
            } else if (type === 'task') {
                state.tasks = state.tasks.filter(t => t.id !== id);
                renderTasks();
                showToast('Task deleted');
            } else if (type === 'student') {
                state.students = state.students.filter(s => s.id !== id);
                // Cascading delete: Remove all logs associated with this student
                state.activities = state.activities.filter(a => a.studentId !== id);
                updateAllViews();
                showToast('Student & logs removed');
            }
            hideConfirmModal();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            
            toast.classList.remove('toast-enter');
            toast.classList.add('toast-enter-active');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('toast-enter-active');
                toast.classList.add('toast-enter');
            }, 3000);
        }

    </script>
</body>
</html>
